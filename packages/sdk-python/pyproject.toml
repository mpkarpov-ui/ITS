[project]
name = "its-sdk-python"
version = "0.1.0"
description = "ITS Python SDK - @source, @processor, @publish, @subscribe decorators."
requires-python = ">=3.11"
dependencies = ["nats-py", "pydantic>=2"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/its_sdk"]
